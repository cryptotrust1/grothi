# Auto-deploy to production server on push to main
# Triggered when PRs are merged or code is pushed directly to main
#
# Required GitHub Secrets:
#   SSH_HOST     - Server IP (e.g. 89.167.18.92)
#   SSH_USER     - SSH user (e.g. root)
#   SSH_PASSWORD - SSH password

name: Deploy to Production

on:
  push:
    branches:
      - main

# Prevent concurrent deployments - queue instead of cancel
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate secrets
        run: |
          MISSING=""
          if [ -z "${{ secrets.SSH_HOST }}" ]; then MISSING="$MISSING SSH_HOST"; fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then MISSING="$MISSING SSH_USER"; fi
          if [ -z "${{ secrets.SSH_PASSWORD }}" ]; then MISSING="$MISSING SSH_PASSWORD"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            echo "Go to GitHub → Settings → Secrets → Actions and add them."
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          timeout: 30s
          command_timeout: 12m
          script: |
            cd /home/acechange-bot/grothi || {
              echo "ERROR: Deploy path /home/acechange-bot/grothi not found"
              exit 1
            }
            echo "=== Grothi Auto-Deploy ==="
            echo "Commit: ${{ github.sha }}"
            echo "Actor: ${{ github.actor }}"
            echo ""
            bash deploy.sh
            echo ""
            echo "=== Auto-Deploy Complete ==="

      - name: Verify deployment
        if: success()
        run: |
          echo "Waiting 10s for app to start..."
          sleep 10
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 "https://grothi.com/" 2>/dev/null || echo "000")
          echo "Health check: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "307" ]; then
            echo "grothi.com is responding normally."
          else
            echo "::warning::grothi.com returned HTTP $HTTP_CODE - site may need manual check"
          fi

      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## Deployment Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Server:** \`${{ secrets.SSH_HOST }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Commit:** \`${GITHUB_SHA::8}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Deployment FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Manual deploy:**" >> $GITHUB_STEP_SUMMARY
            echo '```bash' >> $GITHUB_STEP_SUMMARY
            echo "ssh root@89.167.18.92" >> $GITHUB_STEP_SUMMARY
            echo "cd /home/acechange-bot/grothi && bash deploy.sh" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
