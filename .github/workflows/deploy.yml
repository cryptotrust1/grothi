# Auto-deploy to production server on push to main
# Triggered when PRs are merged or code is pushed directly to main
#
# Required GitHub Secrets:
#   SSH_HOST       - Server IP (89.167.18.92)
#   SSH_USER       - SSH user (root)
#   SSH_PASSWORD   - SSH password

name: Deploy to Production

on:
  push:
    branches:
      - main

# Prevent concurrent deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.SSH_USER }}" ] || [ -z "${{ secrets.SSH_PASSWORD }}" ]; then
            echo "::error::Missing required secrets. Set SSH_HOST, SSH_USER, and SSH_PASSWORD in GitHub Settings > Secrets."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          timeout: 30s
          command_timeout: 12m
          script: |
            set -e
            cd /home/acechange-bot/grothi || {
              echo "ERROR: Deploy path not found"
              exit 1
            }

            echo "=== Grothi Auto-Deploy ==="
            echo "Triggered by GitHub Actions"
            echo ""

            bash deploy.sh

            echo ""
            echo "=== Auto-Deploy Complete ==="

      - name: Deployment summary
        if: success()
        run: |
          echo "## Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** ${{ secrets.SSH_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY

      - name: Deployment failed
        if: failure()
        run: |
          echo "## Deployment FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
          echo "You may need to deploy manually:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "cd /home/acechange-bot/grothi && bash deploy.sh" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
